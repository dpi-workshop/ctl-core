<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">CTL package flow</title>
  <desc id="desc">Source material is copied, tagged, and linked into a portable CTL package that can be read by humans, agents, and databases.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .box { fill: #ffffff; stroke: #365a8c; stroke-width: 2; rx: 12; }
      .core { fill: #eaf1ff; stroke: #1f4d91; stroke-width: 3; rx: 14; }
      .arrow { stroke: #2f3b52; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .title { fill: #172033; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .label { fill: #172033; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #41506b; font-family: Arial, sans-serif; font-size: 14px; }
      .tag { fill: #1e7d5a; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2f3b52"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="280"/>
  <text class="title" x="40" y="44">CTL-Core: Copy, Tag, Link</text>
  <rect class="box" x="40" y="80" width="190" height="130"/>
  <text class="label" x="70" y="118">Source Material</text>
  <text class="small" x="70" y="150">PDF, HTML, docs</text>
  <text class="small" x="70" y="174">images, tables</text>
  <text class="small" x="70" y="198">code, feeds</text>
  <path class="arrow" d="M245 145 H330"/>
  <rect class="core" x="350" y="70" width="260" height="150"/>
  <text class="label" x="394" y="112">Portable Package</text>
  <text class="tag" x="392" y="146">originals + copied assets</text>
  <text class="tag" x="392" y="172">semantic HTML + links</text>
  <text class="tag" x="392" y="198">JSON indexes + OKF cards</text>
  <path class="arrow" d="M630 145 H715"/>
  <rect class="box" x="735" y="80" width="185" height="130"/>
  <text class="label" x="768" y="118">Use Anywhere</text>
  <text class="small" x="768" y="150">browser, agents</text>
  <text class="small" x="768" y="174">SQL, graph, vector</text>
  <text class="small" x="768" y="198">static hosting</text>
  <text class="small" x="40" y="250">The CTL folder remains useful even when databases, models, or vendors change.</text>
</svg>
