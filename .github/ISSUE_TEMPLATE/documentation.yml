name: Documentation issue
description: Report unclear, missing, stale, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or name the file/section.
      placeholder: README.md, docs/agent-use.md, docs/adapters.md, etc.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, stale, or wrong?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have replacement wording, include it here.
    validations:
      required: false

